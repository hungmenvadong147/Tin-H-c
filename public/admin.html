<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản trị - Website Học Tập</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="admin-container">
        <header class="admin-header">
            <h1>🎓 Quản trị Website</h1>
            <a href="index.html" class="btn-back">← Về trang chủ</a>
        </header>

        <div class="admin-content">
            <!-- Tab Navigation -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="settings">Cài đặt</button>
                <button class="tab-btn" data-tab="sections">Nội dung Menu</button>
                <button class="tab-btn" data-tab="courses">Khóa học</button>
                <button class="tab-btn" data-tab="gallery">Thư viện ảnh</button>
            </div>

            <!-- Tab: Cài đặt -->
            <div class="tab-content active" id="settings">
                <h2>Thông tin liên hệ</h2>
                <div class="form-group">
                    <label>Số điện thoại:</label>
                    <input type="text" id="phone" placeholder="0786985687">
                </div>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="email" placeholder="huynhnhathunghhcl@gmail.com">
                </div>
                <button class="btn btn-primary" onclick="saveSettings()">💾 Lưu cài đặt</button>
            </div>

            <!-- Tab: Nội dung Menu -->
            <div class="tab-content" id="sections">
                <h2>Chỉnh sửa nội dung các mục menu</h2>
                <div id="sectionsContainer">
                    <!-- Sections will be loaded here -->
                </div>
            </div>

            <!-- Tab: Khóa học -->
            <div class="tab-content" id="courses">
                <h2>Quản lý khóa học</h2>
                <button class="btn btn-success" onclick="showAddCourseForm()">➕ Thêm khóa học mới</button>
                
                <div id="addCourseForm" class="form-container" style="display: none;">
                    <h3>Thêm khóa học mới</h3>
                    <div class="form-group">
                        <label>Tiêu đề:</label>
                        <input type="text" id="courseTitle" placeholder="Tên khóa học">
                    </div>
                    <div class="form-group">
                        <label>Mô tả:</label>
                        <textarea id="courseDescription" rows="4" placeholder="Mô tả khóa học"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Video:</label>
                        <input type="file" id="courseVideo" accept="video/*">
                        <small>Hoặc nhập URL video:</small>
                        <input type="text" id="courseVideoUrl" placeholder="https://...">
                    </div>
                    <button class="btn btn-primary" onclick="addCourse()">💾 Lưu khóa học</button>
                    <button class="btn btn-secondary" onclick="hideAddCourseForm()">❌ Hủy</button>
                </div>

                <div id="coursesContainer" class="courses-list">
                    <!-- Courses will be loaded here -->
                </div>
            </div>

            <!-- Tab: Thư viện ảnh -->
            <div class="tab-content" id="gallery">
                <h2>Quản lý thư viện ảnh</h2>
                <div class="form-group">
                    <label>Thêm ảnh mới:</label>
                    <input type="file" id="galleryImage" accept="image/*">
                    <input type="text" id="galleryCaption" placeholder="Chú thích (tùy chọn)">
                    <button class="btn btn-success" onclick="addGalleryImage()">➕ Thêm ảnh</button>
                </div>
                <div id="galleryContainer" class="gallery-admin">
                    <!-- Gallery images will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
